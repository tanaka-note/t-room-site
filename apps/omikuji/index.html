<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fff4d8">
  <meta name="description" content="六角みくじ箱を振って木札の運勢を楽しむ、T-ROOMのおみくじWebアプリです。">
  <title>T-ROOM おみくじ</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./omikuji.css?v=20260621-omikuji1">
</head>
<body>
  <main class="omikuji-app" aria-labelledby="omikuji-title">
    <div class="app-shortcuts" aria-label="アプリ操作">
      <a href="../../apps.html" aria-label="アプリ一覧へ戻る">戻る</a>
    </div>

    <section class="omikuji-stage">
      <div class="title-block">
        <p class="eyebrow">T-ROOM little app</p>
        <h1 id="omikuji-title">T-ROOM おみくじ</h1>
        <p>六角みくじ箱を振って、今日の小さな運勢を引いてみましょう。</p>
      </div>

      <div class="fortune-scene" aria-live="polite">
        <div class="box-wrap" aria-hidden="true">
          <div id="omikujiBox" class="omikuji-box">
            <div class="box-face front">T</div>
            <div class="box-face side side-left"></div>
            <div class="box-face side side-right"></div>
            <div class="box-mouth"></div>
          </div>
          <div class="box-shadow"></div>
        </div>

        <div id="fortuneStick" class="fortune-stick" aria-hidden="true">
          <span id="fortuneWord">吉</span>
          <small id="fortuneSub">よい一日</small>
        </div>

        <p id="statusText" class="status-text">心を静かにして、箱を振ってください。</p>
      </div>

      <div id="resultPanel" class="result-panel" hidden>
        <p id="resultRank" class="result-rank"></p>
        <p id="resultMessage" class="result-message"></p>
      </div>

      <div class="action-area">
        <button id="drawButton" class="draw-button" type="button">振る</button>
      </div>
    </section>
  </main>

  <script src="./omikuji.js?v=20260621-omikuji1" defer></script>
</body>
</html>
