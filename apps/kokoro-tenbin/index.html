<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7e8">
  <meta name="description" content="A案とB案を心の天秤にのせて、50%ずつのランダム判定で迷いをそっと後押しするT-ROOMのWebアプリです。">
  <title>心の天秤 | T-ROOM</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./kokoro-tenbin.css?v=20260622-tenbin2">
</head>
<body>
  <main class="tenbin-app" aria-labelledby="tenbin-title">
    <div class="app-shortcuts" aria-label="アプリ操作">
      <a href="../../apps.html" aria-label="アプリ一覧へ戻る">戻る</a>
    </div>

    <section class="tenbin-shell">
      <header class="tenbin-header">
        <p class="eyebrow">T-ROOM little app</p>
        <h1 id="tenbin-title">心の天秤</h1>
        <p>迷ったら、天秤にのせてみよう</p>
      </header>

      <section class="choice-card" aria-label="迷っている2つの案">
        <label class="choice-field choice-a">
          <span>A</span>
          <textarea id="choiceA" maxlength="80" rows="2" placeholder="進める" autocomplete="off"></textarea>
        </label>
        <label class="choice-field choice-b">
          <span>B</span>
          <textarea id="choiceB" maxlength="80" rows="2" placeholder="少し待つ" autocomplete="off"></textarea>
        </label>
      </section>

      <section class="seesaw-area" aria-label="心の天秤">
        <div id="seesaw" class="seesaw">
          <div class="beam-wrap">
            <div class="plate plate-a">
              <span>A</span>
            </div>
            <div id="beam" class="beam"></div>
            <div class="plate plate-b">
              <span>B</span>
            </div>
          </div>
          <div class="fulcrum" aria-hidden="true"></div>
          <div class="ground-shadow" aria-hidden="true"></div>
        </div>
        <p id="statusText" class="status-text">AとBを入力すると、天秤にかけられます。</p>
      </section>

      <section id="resultPanel" class="result-panel" aria-live="polite" hidden>
        <p id="resultLead"></p>
        <strong id="resultText"></strong>
      </section>

      <div class="action-row">
        <button id="judgeButton" class="judge-button" type="button" disabled>天秤にかける</button>
        <button id="resetButton" class="reset-button" type="button">リセット</button>
      </div>
    </section>
  </main>

  <script src="./kokoro-tenbin.js?v=20260622-tenbin2" defer></script>
</body>
</html>
